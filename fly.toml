# Fly.io configuration for EcoFlowMon
# Combined EcoFlowMon + Prometheus + Grafana monitoring stack
app = "ecoflowmon"
primary_region = "fra" # Frankfurt - closest to Germany

[build]
  dockerfile = "Dockerfile"

[env]
  COLLECTION_INTERVAL = "60"
  METRICS_PORT = "9090"
  GF_SECURITY_ADMIN_USER = "admin"

[http_service]
  internal_port = 8080  # Nginx reverse proxy port
  force_https = true
  auto_stop_machines = false  # Keep VM running 24/7 (no auto-pause!)
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

# Persistent volume for Prometheus and Grafana data
# This keeps your historical metrics across deployments!
[mounts]
  source = "prometheus_data"
  destination = "/prometheus/data"
